services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dronedetection
      POSTGRES_USER: droneadmin
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U droneadmin -d dronedetection"]
      interval: 5s
      timeout: 5s
      retries: 5

  system2:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://droneadmin:localpassword@postgres:5432/dronedetection
      MAX_DISTANCE_M: 3000
      TIME_WINDOW_S: 10.0
      CACHE_SIZE: 1000
      LOOP_INTERVAL_S: 0.5
      DB_FLUSH_INTERVAL_S: 60.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./cameras.yaml:/app/cameras.yaml
